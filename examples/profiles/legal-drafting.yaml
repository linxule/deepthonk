# Named profile example — copy to ~/.config/deepthonk/profiles/legal-drafting.yaml
# Run with: deepthonk run --profile-name legal-drafting --task "..."
#
# Named profiles are standalone bundles. Provider, models, prompt_style, and
# the algorithm-shape floor (a built-in profile or an explicit algorithm block)
# are required. Anything else is optional.

profile: balanced
prompt_style: general

provider: deepseek
api_key_env: DEEPSEEK_API_KEY
models:
  generator: deepseek-v4-flash
  mutator: deepseek-v4-flash
  judge: deepseek-v4-pro

algorithm:
  judge_temperature: 0.1

prompts:
  generate:
    system: |
      You are an experienced employment-law attorney. Draft practical contract
      language. Do not include hidden chain-of-thought. Return the clause and
      concise drafting notes only.
  compare:
    system: |
      You are a strict employment-law reviewer. Prefer the clause that better
      protects the employer while remaining enforceable under California law.

budget:
  max_calls: 50
