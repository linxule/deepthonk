name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: build + typecheck + test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24] # pnpm 11 (packageManager) requires Node >= 22.13

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - run: pnpm run lint

      - run: pnpm test

      - name: Fake-provider quick-profile smoke
        run: |
          rm -rf runs/ci-quick
          pnpm --silent --filter deepthonk deepthonk plan --profile paper > /dev/null
          pnpm --silent --filter deepthonk deepthonk run \
            --provider fake --profile quick \
            --task examples/tasks/toy-math.txt --out runs/ci-quick > /dev/null
          pnpm --silent --filter deepthonk deepthonk inspect runs/ci-quick > /dev/null
